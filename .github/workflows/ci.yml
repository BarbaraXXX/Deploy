name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.7.6"

jobs:
  test-agent:
    name: interview-agent (tests + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interview-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: interview-agent/uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run tests with coverage
        run: uv run pytest tests --cov=interview_agent --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-agent
          path: interview-agent/coverage.xml
          if-no-files-found: ignore

  test-vectordb:
    name: interview-vectordb (tests + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interview-vectordb
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: interview-vectordb/uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run tests with coverage
        run: uv run pytest tests --cov=interview_vectordb --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-vectordb
          path: interview-vectordb/coverage.xml
          if-no-files-found: ignore

  test-tester:
    name: interview-tester (tests + lint)
    runs-on: ubuntu-latest
    needs: test-agent  # tester has path dep on interview-agent
    defaults:
      run:
        working-directory: interview-tester
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: interview-tester/uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run tests with coverage
        run: uv run pytest tests --cov=interview_tester --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-tester
          path: interview-tester/coverage.xml
          if-no-files-found: ignore
