services:
  app:
    build: ..
    container_name: interview-agent-app
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ../../data:/app/data
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  nginx:
    image: nginx:alpine
    container_name: interview-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.resolved.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: interview-agent-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

volumes:
  certbot-www:
  certbot-conf:
