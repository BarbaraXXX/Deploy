services:
  app:
    build:
      context: ..
      args:
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.org/simple}
        UV_VERSION: ${UV_VERSION:-0.11.16}
    container_name: interview-agent-app
    restart: unless-stopped
    env_file: ../.env
    environment:
      VECTORDB_BASE_URL: http://vectordb:9000
      AUTH_COOKIE_SECURE: "true"
      INTERVIEW_AGENT_APP_ROOT: /app
      INTERVIEW_AGENT_DATA_DIR: /app/data
    volumes:
      - ../../data:/app/data
    expose:
      - "8000"
    depends_on:
      - vectordb
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  vectordb:
    build:
      context: ../../interview-vectordb
      args:
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.org/simple}
        UV_VERSION: ${UV_VERSION:-0.11.16}
    container_name: interview-vectordb
    restart: unless-stopped
    env_file: ../.env
    environment:
      MCP_SERVER_PORT: "9000"
      VECTORDB_CORS_ORIGINS: ""
      VECTORDB_DATA_DIR: /app/data
    volumes:
      - ../../data/vectordb:/app/data
    expose:
      - "9000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  nginx:
    image: nginx:alpine
    container_name: interview-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.resolved.conf:/etc/nginx/nginx.conf:ro
      - ../data/certbot/www:/var/www/certbot:ro
      - ../data/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: interview-agent-certbot
    volumes:
      - ../data/certbot/www:/var/www/certbot
      - ../data/certbot/conf:/etc/letsencrypt
    entrypoint: ""
    command: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'
